syntax = "proto3";

package authfile;

option go_package = "github.com/i5heu/ouroboros-db/proto/authfile";

message CAKeyFile {
  string type = 1;
  bytes key_json = 2;
  bytes anchor_sig = 3;
  string anchor_admin = 4;
  bytes anchor_admin_pub_kem = 5;
  bytes anchor_admin_pub_sign = 6;
}

message EmbeddedCAFile {
  string type = 1;
  bytes pub_kem = 2;
  bytes pub_sign = 3;
  bytes anchor_sig = 4;
  string anchor_admin = 5;
}

message NodeCertFile {
  string type = 1;
  bytes key_json = 2;
  bytes ca_pub_kem = 3;
  bytes ca_pub_sign = 4;
  bytes ca_signature = 5;
  repeated EmbeddedCAFile authorities = 6;
  string issuer_ca_hash = 7;
  int64 valid_from = 8;
  int64 valid_until = 9;
  bytes serial = 10;
  bytes cert_nonce = 11;
}
