syntax = "proto3";

package auth;

option go_package = "github.com/i5heu/ouroboros-db/proto/auth";

message CanonicalCert {
  uint32 cert_version = 1;
  bytes node_pub_key = 2;
  string issuer_ca_hash = 3;
  int64 valid_from = 4;
  int64 valid_until = 5;
  bytes serial = 6;
  bytes cert_nonce = 7;
}

message CanonicalCertBundle {
  repeated bytes certs = 1;
}

message CanonicalDelegation {
  bytes tls_cert_pub_key_hash = 1;
  bytes tls_exporter_binding = 2;
  bytes tls_transcript_hash = 3;
  bytes x509_fingerprint = 4;
  bytes node_cert_bundle_hash = 5;
  int64 not_before = 6;
  int64 not_after = 7;
}

message CanonicalDelegationNoExporter {
  bytes tls_cert_pub_key_hash = 1;
  bytes tls_transcript_hash = 3;
  bytes x509_fingerprint = 4;
  bytes node_cert_bundle_hash = 5;
  int64 not_before = 6;
  int64 not_after = 7;
}
